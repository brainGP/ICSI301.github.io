<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статик JSON Дата — Даалгавар 3</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background-color: #f0f0f0;
      min-height: 100vh;
      padding: 0;
      display: block;
    }


    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 64px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .section-header {
      padding: 18px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h3 { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .section-header span { font-size: 12px; color: #999; }


    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 10px 16px;
      background: #f7faf5;
      color: #2d5a1b;
      font-weight: 700;
      border-bottom: 2px solid #e8f0e4;
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid #f4f4f4;
      color: #444;
      vertical-align: top;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fdf6; }


    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 32px 24px 0;
      padding: 10px 18px;
      background: #2d5a1b;
      color: #fff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .back-btn:hover { background: #244d15; }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Буцах
  </a>

  <div class="container">
    <div class="section-card">
      <div class="section-header">
        <h3>Эмийн санууд</h3>
      
      </div>
      <div style="overflow-x:auto">
        <table id="pharm-table">
          <thead>
            <tr>
              <th>Нэр</th>
              <th>Салбар</th>
              <th>Хаяг</th>
              <th>Утас</th>
              <th>Цагийн хуваарь</th>
              <th>Нээлттэй</th>
            </tr>
          </thead>
          <tbody id="pharm-body"></tbody>
        </table>
      </div>
    </div>

    <div class="section-card">
      <div class="section-header">
        <h3>Бараа бүтээгдэхүүн</h3>
        
      </div>
      <div style="overflow-x:auto">
        <table id="prod-table">
          <thead>
            <tr>
              <th>Нэр</th>
              <th>Брэнд</th>
              <th>Ангилал</th>
              <th>Хэлбэр</th>
              <th>Үнэ</th>
              <th>Нөөц</th>
              <th>Төлөв</th>
            </tr>
          </thead>
          <tbody id="prod-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { pharmacies, products } from './task3-data.js';

    const renderPharmacies = (data) => {
      
      document.getElementById('pharm-body').innerHTML = data.map(({ name, branch, address, phone, workingHours, isOpen }) => `
        <tr>
          <td title="${name}">${name}</td>
          <td>${branch ?? '—'}</td>
          <td title="${address}">${address}</td>
          <td>${phone ?? '—'}</td>
          <td>${workingHours ?? '—'}</td>
          <td><span>${isOpen ? 'Нээлттэй' : 'Хаалттай'}</span></td>
        </tr>`).join('');
    };

    const renderProducts = (data) => {
      
      document.getElementById('prod-body').innerHTML = data.map(({ name, brand, category, form, price, stock, status }) => `
        <tr>
          <td title="${name}">${name}</td>
          <td>${brand ?? '—'}</td>
          <td>${category ?? '—'}</td>
          <td>${form ?? '—'}</td>
          <td>${price.toLocaleString()}₮</td>
          <td>${stock}</td>
          <td><span>${status}</span></td>
        </tr>`).join('');
    };

    renderPharmacies(pharmacies);
    renderProducts(products);
  </script>

</body>
</html>
