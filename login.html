<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Эмийн Сан Хайгч - Нэвтрэх</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
      <div class="brand-text">
        <h2>Эмийн Сан Хайгч</h2>
        <p>Хурдан - Үр дүнтэй - Хялбар</p>
      </div>
    </div>
    <div class="heading">
      <h1>Тавтай морил</h1>
      <p>Бүртгэлдээ нэвтрэх</p>
    </div>

    <form>
      <div class="form-group">
        <label for="email">И-мэйл хаяг</label>
        <div class="input-wrapper">
          <span class="icon-left">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="имэйл ээ оруулна уу" autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Нууц үг</label>
        <div class="input-wrapper">
          <span class="icon-left">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" value="••••••••" autocomplete="current-password" />
          <button type="button" class="icon-right" onclick="togglePassword()" aria-label="Нууц үг харуулах">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember">
          <input type="checkbox" /> Намайг санах
        </label>
        <a href="#" class="forgot">Нууц үг мартсан уу?</a>
      </div>

      <button type="submit" class="btn-primary">Нэвтрэх</button>
    </form>

    <div class="divider"><span>Эсвэл үргэлжлүүлэх</span></div>

    <button class="btn-google">
      <svg class="google-logo" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Google-ээр нэвтрэх
    </button>
    <p class="bottom-row">Бүртгэл байхгүй юу? <a href="signup.html">Бүртгүүлэх</a></p>

    <div class="owner-section">
      <p>Та эмийн сангийн эзэн үү?</p>
      <button class="btn-owner">Эзний хяналтын самбар руу очих</button>
    </div>

  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
